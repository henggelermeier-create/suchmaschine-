version: "3.9"

services:
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: kauvio_webapp
    ports:
      - "3002:3002"
    expose:
      - "3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      APP_URL: https://kauvio.ch
      JWT_SECRET: super-secret-123
      ADMIN_EMAIL: admin@kauvio.ch
      ADMIN_PASSWORD: Tuti@369*
      DATABASE_URL: postgresql://kauvio:kauvio123@postgres:5432/kauvio
      REDIS_URL: redis://:redis-kauvio-123@redis:6379
      AI_SERVICE_URL: http://ai_service:3010
      AFFILIATE_DEFAULT_TAG: kauvio-default
    depends_on:
      - postgres
      - redis
      - ai_service
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    container_name: kauvio_crawler
    environment:
      DATABASE_URL: postgresql://kauvio:kauvio123@postgres:5432/kauvio
      REDIS_URL: redis://:redis-kauvio-123@redis:6379
      FAST_CRAWLER_INTERVAL_SECONDS: 600
      FULL_CRAWLER_INTERVAL_SECONDS: 3600
      IMPORT_LIMIT_PER_PAGE: 24
      DIGITEC_FAST_URLS: https://www.digitec.ch/de/s1/producttype/toplist/relevance/smartphones-24
      DIGITEC_FULL_URLS: https://www.digitec.ch/de/s1/producttype/toplist/relevance/smartphones-24,https://www.digitec.ch/de/s1/producttype/toplist/relevance/notebook-6,https://www.digitec.ch/de/s1/producttype/toplist/relevance/headphones-48
      DIGITEC_IMPORT_LIMIT_PER_PAGE: 18
      BRACK_FAST_URLS: https://www.brack.ch/it-multimedia/handy-telefonie/smartphone-handy/smartphones
      BRACK_FULL_URLS: https://www.brack.ch/it-multimedia/handy-telefonie/smartphone-handy/smartphones,https://www.brack.ch/it-multimedia/notebook-tablet/notebooks
      BRACK_IMPORT_LIMIT_PER_PAGE: 18
      INTERDISCOUNT_FAST_URLS: https://www.interdiscount.ch/de/telefone-tablets-smartwatches/handys-smartphones--c411000
      INTERDISCOUNT_FULL_URLS: https://www.interdiscount.ch/de/telefone-tablets-smartwatches/handys-smartphones--c411000,https://www.interdiscount.ch/de/computer-gaming/notebooks-notebooks--c511000
      INTERDISCOUNT_IMPORT_LIMIT_PER_PAGE: 18
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ai_service:
    build:
      context: ./services/ai_service
      dockerfile: Dockerfile
    container_name: kauvio_ai_service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: kauvio_worker
    environment:
      DATABASE_URL: postgresql://kauvio:kauvio123@postgres:5432/kauvio
      REDIS_URL: redis://:redis-kauvio-123@redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@kauvio.ch}
      ALERT_CHECK_INTERVAL_SECONDS: 120
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kauvio_postgres
    environment:
      POSTGRES_DB: kauvio
      POSTGRES_USER: kauvio
      POSTGRES_PASSWORD: kauvio123
    volumes:
      - kauvio_postgres_data_v41:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kauvio_redis
    command: redis-server --requirepass redis-kauvio-123 --save "" --appendonly no
    restart: unless-stopped

volumes:
  kauvio_postgres_data_v41:
