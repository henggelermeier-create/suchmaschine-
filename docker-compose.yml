version: "3.9"

services:
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: kauvio_webapp
    ports:
      - "3002:3002"
    expose:
      - "3002"
    environment:
      PORT: ${PORT:-3002}
      NODE_ENV: ${NODE_ENV:-production}
      APP_URL: ${APP_URL:-https://kauvio.ch}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:3010}
      AFFILIATE_DEFAULT_TAG: ${AFFILIATE_DEFAULT_TAG:-kauvio-default}
    depends_on:
      - postgres
      - redis
      - ai_service
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile.timeout
    container_name: kauvio_crawler
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      FAST_CRAWLER_INTERVAL_SECONDS: 600
      FULL_CRAWLER_INTERVAL_SECONDS: 3600
      IMPORT_LIMIT_PER_PAGE: 36
      CRAWLER_FETCH_TIMEOUT_MS: 120000
      CRAWLER_AUTO_START_FAST: "false"
      CRAWLER_AUTO_START_FULL: "false"
      DIGITEC_IMPORT_URLS: https://www.digitec.ch/de/s1/producttype/smartphone-24,https://www.digitec.ch/de/s1/producttype/notebook-6,https://www.digitec.ch/de/s1/producttype/kopfhoerer-48,https://www.digitec.ch/de/s1/producttype/staubsauger-118
      GALAXUS_IMPORT_URLS: https://www.galaxus.ch/de/s1/producttype/smartphone-24,https://www.galaxus.ch/de/s1/producttype/notebook-6,https://www.galaxus.ch/de/s1/producttype/kopfhoerer-48,https://www.galaxus.ch/de/s2/producttype/staubsauger-118
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ai_service:
    build:
      context: ./services/ai_service
      dockerfile: Dockerfile
    container_name: kauvio_ai_service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: kauvio_worker
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@kauvio.ch}
      ALERT_CHECK_INTERVAL_SECONDS: ${ALERT_CHECK_INTERVAL_SECONDS:-120}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kauvio_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - kauvio_postgres_data_v42:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kauvio_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\" --save \"\" --appendonly no"]
    restart: unless-stopped

volumes:
  kauvio_postgres_data_v42:
